<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOY Controller v4.0</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <!-- Шапка -->
    <header class="header">
        <h1>🔥 MOY Controller v4.0</h1>
        <div class="status">
            <span class="dot"></span>
            <span id="statusText">Подключено</span>
            <span id="timeDisplay" class="time">--</span>
        </div>
    </header>

    <!-- Навигация -->
    <nav class="tabs" id="tabNav">
        <button class="tab active" data-page="dashboard">📊 Дашборд</button>
        <button class="tab" data-page="graphs">📈 Графики</button>
        <button class="tab" data-page="settings">⚙️ Настройки</button>
    </nav>

    <!-- Контейнер для страниц -->
    <main id="pageContainer"></main>

    <!-- Главный скрипт -->
    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
